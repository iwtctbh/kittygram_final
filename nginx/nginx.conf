server {
    listen 80;
    server_name localhost;
    index index.html;

    location /static/ {
        alias /static/static/;
    }

    location /media/ {
        alias /media/;
    }

    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/api/;
    }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/admin/;
    }

    location / {
        root /static;
        try_files $uri $uri/ /index.html;
    }
}